{% extends "core/base.html" %}
{% block title %}Admin Portal{% endblock %}

    <p class="small">System management and workforce oversight.</p>

    <div class="admin-grid">
      <a href="{% url 'admin_schedule' %}" class="admin-tile">
        <h3>📅 Schedule & Policy</h3>

      <a href="{% url 'admin_timesheets' %}" class="admin-tile">

        <p>Review employee work logs and hours</p>
      </a>
    </div>
  </div>
{% endblock %}
